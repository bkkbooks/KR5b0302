front:
  text: 道迹靈仙記惟七
  hash: sha256:79009e52a2bb86638b4759d92ed3bab49757e63b478c4d85307e010e99715f56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0302_HFL_000-001a, image: hfl/0330/0330-102.png}
body:
  text: 六宫名第一羅酆山在北方之癸地山髙二千六百里周回三萬里其山下有洞天在山之下周回一萬五千里其上其下並有鬼神宫室山上有六宫洞中復有六宫一宫輒周回千里是為六天鬼神之宫也山上為外宫洞中為內宫制度等耳第一宫名為紂絶隂天宫第二宫名為太殺諒事宗天宫第三宫名為明晨耐犯武城天宫第四宫名為恬照罪氣天宫第五宫名為宗靈七非天宫第六宫名為敢司連宛屢天宫凡六天宫是為鬼神六天之治也洞中六天宫亦同名相像如一號六天內外宫殿者也世人有知酆都六天宫門名則百鬼不敢為害欲卧時先向北呪之三過微其音也神呪曰吾是太上弟子下統六天六天之宫是吾所部不但所部乃太上之所主吾知六天門名是故長生敢有犯者太上斬汝第一宫名紂絶隂大宫以次東行第二從此以次訖六宫止乃啄齒六下乃卧辟諸鬼魔之氣人初死皆先詣紂絶隂天宮中受事或有先詣名山及泰山江河者不必便徑先詣第一天也要受事之日罪考吉凶之目當來詣此第一天宫耳太殺天宫主殺鬼是第二天也卒死暴亡又經於此也賢人聖人去世先經明晨第三天宫受事禍福吉凶宿命罪害由恬照第四天宫鬼官北斗君治此中鬼官之北斗非天上之北斗也鬼官别有北斗君以司生殺耳鬼官之太帝者北帝君也治第一天宫中總主諸六天宫餘四天宫其四明公各在其中治二天宫輒立一官六天凡立為三官三官如今之刑名之職主諸考謫常以上屬真仙司命兼以總御之也並統仙府共司死生之任大斷制皆由仙官鬼官北斗君乃是道家七辰北斗之考官耳此鬼一官又𨽻九星之精上屬北辰玉君項梁成作酆都頌曰紂絶摽帝晨諒事遘重阿炎如霄中煙勃若景耀華武城帶神峯恬照吞青河閻闔臨丹井雲門鬱嵯峨七非通竒蓋連宛亦敷魔六天橫北道此是鬼神家頌有二萬言今略道六天之宫銘鈔出之耳夜中亦可微讀亦云辟鬼邪酆都山上樹木水澤俱如人間但稻粒如石榴子大味如菱其餘四穀故爾但名稻名重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈氣交被嘉穀應時四節既享祝人以祠神禾鬱于浩京巨穗橫我玄臺爰有明祥帝者以熙此之謂矣酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官鬼神主第二炎慶甲者古之炎帝也今為北太帝君天下鬼神之主也武王發今為鬼官北斗君夏啓為東明公領斗君師文王為西明公領北帝師召公奭為南明公吳季札為北明公四明公復有賔友四人然此四公後並當受化形之道升仙階之下也四明主領四方鬼四明郎十六人主天下房廟鬼之血食周顗為鬼官司命帥今鄧嶽程遐二人代以其多事故也西明都禁郎賈誼昔為治馬融事不當黜守泰山泰山君近請為司馬南門亭長今用周撫代郤鑒一天門有二亭長一亭長輒有四修門郎一天門凡八修門郎也門郎為天門亭長下官此是北帝門也北斗君天門亭長今是臧洪臧洪代隗囂又一人是王波新補紀瞻本為撫河將軍司馬今為北天修門郎代田銀瞻與虞談更直一日守天門魏釗領廬山侯顧和從遼東戍還有事巳散北帝君當用為執蓋郎執蓋郎范明遷補典柄侯殷浩侍帝晨與何晏對溫太真為監海開國伯治東海近取杜預為長史位比大將軍長史何次道始從北帝內禁御史得還朱火宫受化以其先多施惠之功故也魏武帝為北若太傅其餘多不能復一二此蓋鬼神之事不足示於世也荀公言也人卧法第三人卧牀當令髙髙則地氣不及鬼吹不干鬼氣之侵人常依地而逆上耳人卧室宇當令潔淨潔淨則受靈氣不淨則受故氣故氣之亂人室宇者所為不成所作不立一身亦爾當數洗沐澡潔不爾無冀勿道學道道學道鬼犯人事不立使人病是體未真故也山世逺受孟先生法暮卧先讀黃庭內經一過乃眠使人魂𩲸自練制但行此二十一年亦仙是為合萬過也夕得三四過乃佳北嶽蔣夫人云讀此亦使人無病是不死之道也夜行啄齒第四夜行常啄齒啄齒亦無限數也殺鬼邪鬼常畏啄齒聲是故不得犯人也若兼之以漱液呪説益善昔鮑助者濟北人都不學道亦不知法術年四十餘忽得面風口目不正風氣入口而兩齒上下常相切拍甚有聲響如此晝夜不止得壽年百二十七歲後乃遇寒過大水墮長壽河中死耳北帝中間亦比遣殺鬼及日遊地殃使取之而此數殺鬼終不敢近助鬼官問其故天殺答云此人乃多方術以制於我常行叩齒鳴打天鼓以警身中神神不得散鬼氣不得入是以無有緣起趣得殺之耳以此論之若助不行水渡河亦或可出千歲壽不訾也當是遇大寒凍步行水上口禁不能復叩齒是故鬼因溺著河中耳患風病而齒自叩動者猶尚僻不死却殺鬼矣何況道士真叩齒鳴天鼓具身神耶仙方云常吞液叩齒使人反少太帝官𨽻第五侍帝晨有八人徐庶龐得爰榆李廣王嘉何晏解結殷浩等居之並如世之侍中四明公及北斗君並有侍帝晨五人其向者八人是北太帝官𨽻耳其選用亦同又有中郎直事四人如世之尚書也戴淵公孫度劉封郭嘉此四人今見在職封者是玄德之養子玄德今為北河侯與韓遂對統今屬仙官又有大禁晨二人如今尚書今漢光武及孫文臺二人居之又有中禁晨如今之中書令監有二人顔懷楊彪二人居之懷字思季彪字文先者也許長史父今為南彈方侯彈方侯有二人各司南北許長史父為南彈方侯留贊為司馬鮑勛為北彈方侯韋遵為司馬亦各主南北門籥許領威南兵千人鮑勛領威北兵千人大都備門主收執而巳如今世上有羽林監威南兵威北兵如道家天丁力士甲卒之例也孫䇿為東明公賔友漢髙為南明公賔友晉宣為西明公賔友荀或為北明公賔友其中宿運前生在世有隂德惠拯者乃時有徑補天官或入南宫受化不拘職位也在世之罪福多少乃為稱量處分耳大都行隂德多恤窮厄例皆速入南宫為仙化之道也𢈔元規為北太帝前中衛大將軍取郭長翔為長史以華韶為司馬此所謂軍公者也領鬼兵數千人孔文舉為後中衛大將軍以張繡為司馬唐固為長史陶侃為西河侯亦領兵數千近求滕含自代猶未許侃以徐寧為長史坐收北闕叛將不擒免官當以蔡謨代寧四鎮皆領鬼兵萬人中官領兵不過數千四鎮有泰山君盧龍公東越大將軍南巴侯四官各領一萬人也何曾為南巴侯曹仁為盧龍公劉陶為東越大將軍荀顗為泰山君領兵一萬鎮處亦有數百處也領數千鎮處亦有數百處更相統𨽻耳皆有長史司馬顗取顧衆為泰山將軍用曹洪為司馬桓範為長史王逸少有事繫禁中已五年云事已散蔣濟為南山伯領二千兵王廙為部鬼將軍此有職位者粗相識知姓字耳其無位者不可一二盡知之也如此散者無限數也指記中國人邊方不可一二許肇今為東明公右帥晨帥晨之任如世間中書監邵奭為東明公云行上補九宫右保公地下主者復有三等鬼帥之號復有三等並是世有功德積行所鍾或身求長生涉道所及或子弟善行庸播祖禰或諷明洞玄化流昆祖夫求之者非一而獲之者多途矣要由世積隂行然後階此廣生耳鬼帥武解主者文解俱仙之始也亦度名東華簡刋上帝不𨽻酆官不受制度三官之府矣其一等地下主者散在外舍間停無業不受九宫教制不聞練化之業雖俱在洞天而是主者之下者也比自按四明法一百四十年依格得進耳一進始得步仙階給仙人使令其二等地下主者便徑得行仙階給仙人四十年進補管禁位管禁之位如世間散吏者也此格即下主者之中條也李東等今在一等中其三等地下主者即主者之髙者也便得出入仙人之堂寢遊行神州之鄉出館易遷童初二府入宴東華上臺受學化形濯景易氣十二年氣攝神魂十五年神來藏魄三十年棺中骨還附神神氣四十年平復更生還遊人間五十年位補仙官六十年得遊廣寒百年得入崑瀛之宫此即主者之上者仙人之縱容矣張薑子等先在第三等中亦始得入易遷耳鬼帥之位次亦如此矣右七月二十四日夜保命君告靈人辛玄子自序拜詩辛玄子字延期隴西定谷人也漢明帝時諫議大夫上洛雲中趙國三郡太守辛隱之子也玄子少好學有道尊奉法戒至心苦行日中菜食錬形守精不遘外物州府辟聘一無降就或遊山林棄世風塵志願逢子晉於緱岑旅淩陽以步玄故攺名為玄子而自字為延期矣不圖先世多愆殃流子孫結眚刋於帝簡運況逮於後昆享年不永遂沒命於長梁之津西王母見我苦行酆都上帝愍我道心告勑司命傳檄三官攝取形骸還魂復真使頥胎位為靈神於今二百餘年矣近得度名南宫定䇿朱陵藏精待時方列為仙而太帝今且見差領東海侯代𢈔生又見選補禁中郎將為吳越鬼神之司主事靡濫斯亦勞矣若夫冠晨佩青蕭條羽袂鳴鈴仙階轉軿瓊室者雖實素心而卒未有日也恨未便得與玄真併羅同宴崑閬之墉察鈞韶之遺音掇瓊芝乎幽峯振翠衣於九霄儛雲翮於十方耳方當攝御群鬼領理是非處衆穢之中聞聲交於邪魔之紛紜事與道德為闊眼與盻真為踈熟比熙寂於玄境逍遙於太𥘉哉夫同聲偕合物亦類分相聞邈矣係景委積是以名書上清丹籙玄階有道之氣與靈合德託體髙暉故來相從今贈詩三篇以敘推情之至也其詞曰疇昔入冥鄉順駕應靈招神隨室無散氣與慶雲消形非明玉質玄匠安能雕躡足吟幽唱仰手玩鳴條林室有逸歡絶此軒外交遺景附圓曜嘉音何寥寥寂通寄興感玄氣攝動音髙輪雖參差萬仭故來尋蕭蕭研道子合神契靈襟委順浪世化心摽𥥆窕林同期理外遊相與靜東岑命駕廣酆阿逸迹超冥鄉空中自有物有中亦無常悟言有無際相與會濠梁目擊玄解子鬼神理自忘玄子云魏時辛毗字佐治是其七世之孫也漢建武二年從隴西徙居穎川陽翟縣毗仕魏世使持節大將軍司馬宣王軍帥衛尉侯毗子名敞為河內太守太常卿玄子云𢈔生者是晉𢈔太尉也北帝往用為撫東將軍後又轉為東海侯今又用為酆臺侍帝晨如今世侍中右禁監如世右衛將軍而甚重左禁監是謝幼輿以鄧嶽為司馬郤南昌公先為北帝南朱陽大門靈關侯後又轉為髙明司直昔坐與劉慶孫爭免官今始當復職也髙明司直如世間尚書僕射何次道今在南宫承華臺中已得受書行至南嶽中此人在世時施惠之功甚多故早得反形也周伯仁近見用為西明公中都護中都護如世太傅之官也坐選鄧攸不平左降為中護中護準少傅右是辛玄子所言説冥中事亦多矣今粗書一隅耳不復一二具記之也裴君説一年中得道人第七霍山中有學道者鄧伯元王玄甫受服青精石飯吞日丹景之法精思洞房以來積三十四年乃內見五藏冥中夜書以今年五月五日太帝遣羽車見迎伯元玄甫以其日遂乘雲駕龍白日登天今在北玄圃臺受書位為中真人華陽山中有學道者尹虔子張石生李方回並晉武帝時人受仙人管城子蒸丹餌木法俱服得延年日健中又受蘇門周壽陵服丹霞之道從來五十年精心內視不復飲食體骨輕便色如童子以今年二月十二日太一遣迎以其日乘雲升天今在玄州受書為髙仙人石生為東源伯衡山有學道者張禮正李明期二人禮正以漢末在山中服黃精顔色丁壯常如年四十明期以魏末入山服澤瀉柏實丸乃共同止巖中後俱受西城君虹景神丹方從來服此丹巳四十三年中患丹沙之難得俱出廣州為遊客是滕含為剌史時也遂內外洞徹眼明身輕一日行五百里又兼守一亦巳三十年以三月一日東華遣迎以其日乘雲升天今在方諸飊室為上仙廬江潛山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹久久不復食飲而身體輕強反易故形以今年四月十九日北玄老太一迎以雲軿白日升天今在玄州括蒼山有學道者平仲節河東人以大胡亂中國時來渡江入括蒼山師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有真氣今年五月一日中央黃老遣迎即日乘雲駕龍白日升天今在滄浪雲臺剡小白山中有學道者趙廣信陽城人魏末渡江入此山受李法成服氣法又師左君守玄中之道內見五藏徹視法如此十八年周旋郡國或賣藥出入人莫知也多來郡下市丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志别去遂乘雲駕龍白日登天今在東華海中狼伍山中有學道者虞翁生會稽人昔受仙人介君食日精法以吳時來隱此山兼行雲氣回形之道精思積久形體更少如童子今年七月二十三日東華太帝遣迎即日乘雲升天今在湯谷山中赤水山中有學道者朱孺子具未入此山服菊華及木餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎即日乘五色雲車登天今在積石室名山五嶽中學道者數百萬人今年有得道而升天者人名如别年年月月皆有去者如此不可悉紀今為疏一年之得道人耳有不樂上升而長在五嶽名山者亦不可勝數或為仙官使封掌名山者亦復有數千右九月二十日夜清靈疏出東卿道季主等第八司馬季主後入委羽山石室大有宫中受石精金光藏景化形法於西靈子都西靈子都者太玄仙女也其同時今在大有室中者廣寧鮑叔陽太原王養伯穎川劉偉惠代郡段季正俱受師西靈子都之道也季主臨去之際託形枕席為戊己之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘季主墓前碑讃曰玄漠大寂混合隂陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明廣寧鮑叔陽者漢髙帝時趙王張耳張敖之大夫也少好養生服桂屑而卒於語笑間今墓在遼薊城之北山太原王養伯者漢髙吕后攝政時中常侍中郎王採者少服澤瀉與留侯張良俱採藥於終南山而養伯不返師事季主穎川劉偉惠漢景帝時公車司馬劉諷者也後事季主晚服日月氣為入室弟子道成晚歸鄉里託形杖履身死桑樹之下今墓在汝南安城縣西山代郡段季正本隱士者也不見有所服御晚乃從季主學道行度秦川俱得尸解而遂葬於川邊今南鄭秦川是也此人亦季主入室弟子季主一男一女俱得道男名法育女名濟華今皆在委羽山中濟華今日正讀三十九章猶未過竟季主讀玉經服明丹之華挹扶晨之暉今顔色如二十女子鬚長三尺黑如墨也昨日東卿君道如此所疏真竒事也不知此云何耳季主託形隱景潛迹委羽紫陽傳具載其事昨夜東卿至聊試請問季主本末東卿見答今疏如别為以上呈願不怪之省訖付火是後聖李君紀也大都與前者略同然東卿復兼有注解近萬餘言大竒作也昨來多論神化之事聊及季主耳去月又見授神虎經解注非世所聞亦自不賞其旨也若更聞如季主之比者自當密白道迹靈仙記
